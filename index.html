// ─────────────────────────────────────────────
// ── SUPABASE HELPERS
// Settings (hero, about, skills, education, certs) →
//   table: portfolio_settings  (key TEXT PK, value JSONB)
// Collections (experience, projects, messages) →
//   separate tables with id (uuid/serial), created_at

async function loadSection(key) {
  try {
    const {data,error} = await sb.from("portfolio_settings").select("value").eq("key",key).single();
    if (error||!data) return DEFAULT[key];
    return data.value;
  } catch { return DEFAULT[key]; }
}
async function saveSection(key,value) {
  const {error} = await sb.from("portfolio_settings").upsert({key,value},{onConflict:"key"});
  if (error) throw error;
}
async function loadCollection(table) {
  try {
    const {data,error} = await sb.from(table).select("*").order("created_at",{ascending:true});
    if (error||!data||data.length===0) return DEFAULT[table]||[];
    return data;
  } catch { return DEFAULT[table]||[]; }
}
async function addToCollection(table,row) {
  const {data,error} = await sb.from(table).insert(row).select().single();
  if (error) throw error;
  return data;
}
async function deleteFromCollection(table,id) {
  const {error} = await sb.from(table).delete().eq("id",id);
  if (error) throw error;
}

function navigate(page){
  currentPage=page;
  document.querySelectorAll(".nav-link").forEach(l=>l.classList.toggle("active-nav",l.dataset.page===page));
  const main=document.getElementById("main-content");
  main.style.opacity=0;
  setTimeout(()=>{
    main.innerHTML="";
    if(page==="home")        main.innerHTML=renderHome();
    else if(page==="about")      main.innerHTML=renderAbout();
    else if(page==="experience") main.innerHTML=renderExperience();
    else if(page==="skills")     main.innerHTML=renderSkills();
    else if(page==="education")  main.innerHTML=renderEducation();
    else if(page==="projects")   main.innerHTML=renderProjects();
    else if(page==="contact"){   main.innerHTML=renderContact(); bindContact(); }
    else if(page==="admin"){     main.innerHTML=renderAdmin();   bindAdmin();   }
    else if(page==="admin-login"){main.innerHTML=renderAdminLogin(); bindAdminLogin();}
    main.style.opacity=1;
    window.scrollTo(0,0);
  },200);
}
window.navigate=navigate;

          ${[{label:"Email",value:h.email,icon:"@"},{label:"LinkedIn",value:h.linkedin,icon:"in"},{label:"Phone",value:h.phone,icon:"☏"},{label:"Location",value:h.location,icon:"◎"}].map(i=>`<div class="flex gap-4 items-start"><div class="font-mono text-amber-400 w-8 shrink-0 text-sm">${i.icon}</div><div><div class="font-mono text-xs text-slate-500 mb-0.5">${i.label}</div><div class="font-display text-white font-semibold">${i.value}</div></div></div>`).join("")}
        </div>
        <form id="contact-form" class="space-y-4">
          <div><label class="font-mono text-xs text-slate-400 block mb-1">Your Name</label><input id="cf-name" type="text" required class="w-full bg-transparent border border-slate-700 focus:border-amber-400 outline-none px-4 py-3 font-mono text-sm text-white transition-colors" placeholder="John Doe"/></div>
          <div><label class="font-mono text-xs text-slate-400 block mb-1">Email</label><input id="cf-email" type="email" required class="w-full bg-transparent border border-slate-700 focus:border-amber-400 outline-none px-4 py-3 font-mono text-sm text-white transition-colors" placeholder="john@example.com"/></div>
          <div><label class="font-mono text-xs text-slate-400 block mb-1">Message</label><textarea id="cf-msg" rows="5" required class="w-full bg-transparent border border-slate-700 focus:border-amber-400 outline-none px-4 py-3 font-mono text-sm text-white transition-colors resize-none" placeholder="Tell me about your project..."></textarea></div>

          <div id="cf-status" class="font-mono text-xs text-center hidden"></div>

      </div>

}

function bindContact(){
  document.getElementById("contact-form")?.addEventListener("submit",async e=>{
    e.preventDefault();
    const btn=document.getElementById("cf-btn"), status=document.getElementById("cf-status");
    btn.textContent="Sending..."; btn.disabled=true;
    const {error}=await sb.from("messages").insert({
      name:document.getElementById("cf-name").value,
      email:document.getElementById("cf-email").value,
      message:document.getElementById("cf-msg").value
    });
    if(error){
      status.textContent="✗ Failed to send. Please try again.";
      status.className="font-mono text-xs text-center text-rose-400";
    } else {
      status.textContent="✓ Message sent successfully!";
      status.className="font-mono text-xs text-center text-emerald-400";
      document.getElementById("contact-form").reset();
    }
    status.classList.remove("hidden");
    btn.textContent="Send Message"; btn.disabled=false;
  });
}

function renderAdminLogin(){
  return `
  <section class="min-h-screen flex items-center justify-center px-6">
    <div class="w-full max-w-sm">
      <div class="border border-amber-400 p-8">
        <h2 class="font-display text-3xl font-bold text-white mb-2">Admin Login</h2>
        <p class="font-mono text-xs text-slate-400 mb-8">Restricted area — authorized access only</p>
        <div class="space-y-4">
          <div><label class="font-mono text-xs text-slate-400 block mb-1">Email</label><input id="al-email" type="email" class="w-full bg-transparent border border-slate-700 focus:border-amber-400 outline-none px-4 py-3 font-mono text-sm text-white transition-colors"/></div>
          <div><label class="font-mono text-xs text-slate-400 block mb-1">Password</label><input id="al-pass" type="password" class="w-full bg-transparent border border-slate-700 focus:border-amber-400 outline-none px-4 py-3 font-mono text-sm text-white transition-colors"/></div>
          <button id="al-btn" class="w-full bg-amber-400 text-slate-900 font-display font-bold py-3 hover:bg-amber-300 transition-colors">Login</button>
          <div id="al-err" class="font-mono text-xs text-rose-400 text-center hidden"></div>
        </div>
      </div>
    </div>
  </section>`;
}

function bindAdminLogin(){
  document.getElementById("al-btn")?.addEventListener("click",async()=>{
    const email=document.getElementById("al-email").value;
    const pass=document.getElementById("al-pass").value;
    const errEl=document.getElementById("al-err");
    const btn=document.getElementById("al-btn");
    btn.textContent="Logging in..."; btn.disabled=true;
    const {error}=await sb.auth.signInWithPassword({email,password:pass});
    if(error){
      errEl.textContent="Invalid credentials. Try again.";
      errEl.classList.remove("hidden");
      btn.textContent="Login"; btn.disabled=false;
    } else { isAdmin=true; navigate("admin"); }
  });
}

function renderAdmin(){
  if(!isAdmin) return renderAdminLogin();
  return `

      </div>

        <p class="font-mono text-slate-500 text-sm">Select a section above to manage content.</p>
      </div>
    </div>

}

function bindAdmin(){
  document.getElementById("admin-signout")?.addEventListener("click",async()=>{
    await sb.auth.signOut(); isAdmin=false; navigate("home");
  });
}

window.showAdminTab=function(tabId){
  document.querySelectorAll(".admin-tab").forEach(t=>t.classList.remove("border-amber-400","text-amber-400"));
  document.getElementById(tabId)?.classList.add("border-amber-400","text-amber-400");
  const panel=document.getElementById("admin-panel");

  if(tabId==="tab-hero"){
    const h=portfolioData.hero||DEFAULT.hero;
    panel.innerHTML=`<h3 class="font-display font-bold text-white text-xl mb-6">Hero & Contact Info</h3><div class="grid md:grid-cols-2 gap-4">${["name","title","tagline","email","linkedin","phone","location"].map(f=>`<div><label class="font-mono text-xs text-slate-400 block mb-1 capitalize">${f}</label><input id="h-${f}" value="${h[f]||''}" class="w-full bg-transparent border border-slate-700 focus:border-amber-400 outline-none px-3 py-2 font-mono text-sm text-white transition-colors"/></div>`).join("")}</div><button onclick="saveHero()" class="mt-6 bg-amber-400 text-slate-900 font-display font-bold px-6 py-2 hover:bg-amber-300 transition-colors">Save Changes</button><span id="hero-saved" class="ml-4 font-mono text-xs text-emerald-400 hidden">✓ Saved!</span>`;
  }
  else if(tabId==="tab-exp"){
    const exp=portfolioData.experience||DEFAULT.experience;
    panel.innerHTML=`<h3 class="font-display font-bold text-white text-xl mb-6">Experience Entries</h3><div class="space-y-4 mb-6">${exp.map(e=>`<div class="border border-slate-700 p-4"><div class="flex justify-between items-start"><div><div class="font-display font-bold text-white">${e.role}</div><div class="font-mono text-sm text-amber-400">${e.company} — ${e.period}</div></div><button onclick="deleteExp('${e.id}')" class="font-mono text-xs border border-rose-700 text-rose-400 px-2 py-1 hover:bg-rose-700 transition-all">Delete</button></div></div>`).join("")}</div><div class="border border-slate-700 p-6"><h4 class="font-display font-bold text-white mb-4">Add New Entry</h4><div class="grid md:grid-cols-2 gap-3 mb-3">${["role","company","location","period"].map(f=>`<input id="ne-${f}" placeholder="${f}" class="bg-transparent border border-slate-700 focus:border-amber-400 outline-none px-3 py-2 font-mono text-sm text-white"/>`).join("")}</div><textarea id="ne-bullets" rows="3" placeholder="Bullet points (one per line)" class="w-full bg-transparent border border-slate-700 focus:border-amber-400 outline-none px-3 py-2 font-mono text-sm text-white mb-3 resize-none"></textarea><button onclick="addExp()" class="bg-amber-400 text-slate-900 font-display font-bold px-6 py-2 hover:bg-amber-300 transition-colors">Add Entry</button></div>`;
  }
  else if(tabId==="tab-proj"){
    const proj=portfolioData.projects||DEFAULT.projects;
    panel.innerHTML=`<h3 class="font-display font-bold text-white text-xl mb-6">Projects</h3><div class="space-y-4 mb-6">${proj.map(p=>`<div class="border border-slate-700 p-4 flex justify-between items-start"><div><div class="font-display font-bold text-white">${p.title}</div><div class="font-mono text-xs text-slate-400 mt-1">${p.desc.slice(0,80)}...</div></div><button onclick="deleteProj('${p.id}')" class="font-mono text-xs border border-rose-700 text-rose-400 px-2 py-1 hover:bg-rose-700 transition-all ml-4 shrink-0">Delete</button></div>`).join("")}</div><div class="border border-slate-700 p-6"><h4 class="font-display font-bold text-white mb-4">Add New Project</h4><input id="np-title" placeholder="Project Title" class="w-full bg-transparent border border-slate-700 focus:border-amber-400 outline-none px-3 py-2 font-mono text-sm text-white mb-3"/><textarea id="np-desc" rows="3" placeholder="Description" class="w-full bg-transparent border border-slate-700 focus:border-amber-400 outline-none px-3 py-2 font-mono text-sm text-white mb-3 resize-none"></textarea><input id="np-tags" placeholder="Tags (comma separated)" class="w-full bg-transparent border border-slate-700 focus:border-amber-400 outline-none px-3 py-2 font-mono text-sm text-white mb-3"/><button onclick="addProj()" class="bg-amber-400 text-slate-900 font-display font-bold px-6 py-2 hover:bg-amber-300 transition-colors">Add Project</button></div>`;
  }
  else if(tabId==="tab-msgs"){ loadMessages(panel); }
  else if(tabId==="tab-about"){
    const a=portfolioData.about||DEFAULT.about;
    panel.innerHTML=`<h3 class="font-display font-bold text-white text-xl mb-6">Stats</h3><div class="space-y-4 mb-6">${a.stats.map((s,i)=>`<div class="flex gap-4 items-center"><input id="stat-val-${i}" value="${s.value}" class="w-24 bg-transparent border border-slate-700 focus:border-amber-400 outline-none px-3 py-2 font-mono text-sm text-white"/><input id="stat-lbl-${i}" value="${s.label}" class="flex-1 bg-transparent border border-slate-700 focus:border-amber-400 outline-none px-3 py-2 font-mono text-sm text-white"/></div>`).join("")}</div><button onclick="saveStats(${a.stats.length})" class="bg-amber-400 text-slate-900 font-display font-bold px-6 py-2 hover:bg-amber-300 transition-colors">Save Stats</button><span id="stats-saved" class="ml-4 font-mono text-xs text-emerald-400 hidden">✓ Saved!</span>`;
  }
  else if(tabId==="tab-skills"){
    const sk=portfolioData.skills||DEFAULT.skills;
    panel.innerHTML=`<h3 class="font-display font-bold text-white text-xl mb-6">Skills (comma-separated)</h3><div class="space-y-4">${[["tools","Tools & Platforms"],["dev","Development"],["data","Data & Research"],["soft","Soft Skills"]].map(([key,label])=>`<div><label class="font-mono text-xs text-slate-400 block mb-1">${label}</label><textarea id="sk-${key}" rows="3" class="w-full bg-transparent border border-slate-700 focus:border-amber-400 outline-none px-3 py-2 font-mono text-sm text-white resize-none">${(sk[key]||[]).join(", ")}</textarea></div>`).join("")}</div><button onclick="saveSkills()" class="mt-6 bg-amber-400 text-slate-900 font-display font-bold px-6 py-2 hover:bg-amber-300 transition-colors">Save Skills</button><span id="skills-saved" class="ml-4 font-mono text-xs text-emerald-400 hidden">✓ Saved!</span>`;
  }
};

async function loadMessages(panel){
  panel.innerHTML=`<p class="font-mono text-slate-400 text-sm">Loading messages...</p>`;
  const {data,error}=await sb.from("messages").select("*").order("created_at",{ascending:false});
  if(error){ panel.innerHTML=`<p class="font-mono text-rose-400 text-sm">Failed to load. Check Supabase config &amp; RLS policies.</p>`; return; }
  panel.innerHTML=`<h3 class="font-display font-bold text-white text-xl mb-6">Contact Messages (${data.length})</h3>${data.length===0?'<p class="font-mono text-slate-500 text-sm">No messages yet.</p>':data.map(m=>`<div class="border border-slate-700 p-4 mb-4"><div class="flex justify-between mb-2"><span class="font-display font-bold text-white">${m.name}</span><button onclick="deleteMsg('${m.id}')" class="font-mono text-xs border border-rose-700 text-rose-400 px-2 py-1 hover:bg-rose-700 transition-all">Delete</button></div><div class="font-mono text-xs text-amber-400 mb-2">${m.email}</div><div class="font-mono text-sm text-slate-300">${m.message}</div></div>`).join("")}`;
}

window.saveHero=async()=>{
  const data={};
  ["name","title","tagline","email","linkedin","phone","location"].forEach(f=>data[f]=document.getElementById(`h-${f}`).value);
  await saveSection("hero",data); portfolioData.hero=data;
  document.getElementById("hero-saved").classList.remove("hidden");
  setTimeout(()=>document.getElementById("hero-saved")?.classList.add("hidden"),2000);
};
window.addExp=async()=>{
  const row={role:document.getElementById("ne-role").value,company:document.getElementById("ne-company").value,location:document.getElementById("ne-location").value,period:document.getElementById("ne-period").value,bullets:document.getElementById("ne-bullets").value.split("\n").filter(Boolean)};
  const inserted=await addToCollection("experience",row);
  portfolioData.experience=[...(portfolioData.experience||[]),inserted];
  showAdminTab("tab-exp");
};
window.deleteExp=async(id)=>{
  if(!confirm("Delete this entry?")) return;
  await deleteFromCollection("experience",id);
  portfolioData.experience=portfolioData.experience.filter(e=>String(e.id)!==String(id));
  showAdminTab("tab-exp");
};
window.addProj=async()=>{
  const row={title:document.getElementById("np-title").value,desc:document.getElementById("np-desc").value,tags:document.getElementById("np-tags").value.split(",").map(t=>t.trim())};
  const inserted=await addToCollection("projects",row);
  portfolioData.projects=[...(portfolioData.projects||[]),inserted];
  showAdminTab("tab-proj");
};
window.deleteProj=async(id)=>{
  if(!confirm("Delete this project?")) return;
  await deleteFromCollection("projects",id);
  portfolioData.projects=portfolioData.projects.filter(p=>String(p.id)!==String(id));
  showAdminTab("tab-proj");
};
window.deleteMsg=async(id)=>{
  if(!confirm("Delete this message?")) return;
  await deleteFromCollection("messages",id);
  showAdminTab("tab-msgs");
};
window.saveStats=async(n)=>{
  const stats=[];
  for(let i=0;i<n;i++) stats.push({value:document.getElementById(`stat-val-${i}`).value,label:document.getElementById(`stat-lbl-${i}`).value});
  const about={...(portfolioData.about||DEFAULT.about),stats};
  await saveSection("about",about); portfolioData.about=about;
  document.getElementById("stats-saved").classList.remove("hidden");
  setTimeout(()=>document.getElementById("stats-saved")?.classList.add("hidden"),2000);
};
window.saveSkills=async()=>{
  const data={};
  ["tools","dev","data","soft"].forEach(k=>data[k]=document.getElementById(`sk-${k}`).value.split(",").map(s=>s.trim()).filter(Boolean));
  await saveSection("skills",data); portfolioData.skills=data;
  document.getElementById("skills-saved").classList.remove("hidden");
  setTimeout(()=>document.getElementById("skills-saved")?.classList.add("hidden"),2000);
};

loadAll();
</script>
