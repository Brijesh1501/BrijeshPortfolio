<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Portfolio</title>
  <link rel="stylesheet" href="../css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: var(--gradient-hero);
      position: relative;
      overflow: hidden;
    }
    .login-wrap::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--border-subtle) 1px, transparent 1px),
        linear-gradient(90deg, var(--border-subtle) 1px, transparent 1px);
      background-size: 50px 50px;
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>

<div class="login-wrap">
  <div class="login-card">
    <div style="text-align:center; margin-bottom:2rem">
      <a href="../index.html" class="nav-logo" style="display:inline-flex; font-size:1.5rem">
        <span class="accent mono">&lt;</span>BKP<span class="accent mono">/&gt;</span>
      </a>
      <div style="font-family:'Space Mono',monospace; font-size:0.7rem; color:var(--text-muted); margin-top:0.5rem; letter-spacing:0.1em">ADMIN PANEL</div>
    </div>
    
    <div class="card">
      <h2 style="font-family:'Syne',sans-serif; font-size:1.4rem; margin-bottom:0.5rem">Welcome back</h2>
      <p style="color:var(--text-secondary); font-size:0.875rem; margin-bottom:1.75rem">Sign in to manage your portfolio content.</p>
      
      <div id="errorMsg" style="display:none; padding:0.75rem 1rem; background:rgba(255,107,107,0.1); border:1px solid var(--accent-3); border-radius:10px; color:var(--accent-3); font-size:0.85rem; margin-bottom:1rem"></div>
      
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="loginEmail" placeholder="admin@example.com" />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="loginPassword" placeholder="••••••••" />
      </div>
      <button class="btn btn-primary" id="loginBtn" onclick="login()" style="width:100%; margin-top:0.5rem">
        Sign In →
      </button>
      
      <div style="text-align:center; margin-top:1.5rem">
        <a href="../index.html" style="color:var(--text-muted); font-size:0.8rem; text-decoration:none">← Back to Portfolio</a>
      </div>
    </div>
  </div>
</div>

<script src="../js/config.js"></script>
<script>
async function login() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const btn = document.getElementById('loginBtn');
  const errEl = document.getElementById('errorMsg');
  
  errEl.style.display = 'none';
  btn.textContent = 'Signing in...';
  btn.disabled = true;
  
  const { error } = await supabase.auth.signInWithPassword({ email, password });
  
  if (error) {
    errEl.textContent = error.message;
    errEl.style.display = 'block';
    btn.textContent = 'Sign In →';
    btn.disabled = false;
  } else {
    window.location.href = 'dashboard.html';
  }
}

// Check if already logged in
supabase.auth.getSession().then(({ data }) => {
  if (data.session) window.location.href = 'dashboard.html';
});

// Enter key support
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});
</script>
</body>
</html>
